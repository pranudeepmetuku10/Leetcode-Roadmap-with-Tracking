<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Interview Prep - Progress Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: rgba(30, 30, 50, 0.8);
            border: 1px solid rgba(100, 200, 255, 0.2);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #64c8ff 0%, #ff6b9d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #a0a0b0;
            margin-bottom: 20px;
        }

        .progress-bar-container {
            background: rgba(100, 100, 150, 0.2);
            border-radius: 12px;
            overflow: hidden;
            height: 10px;
            margin-bottom: 15px;
        }

        .progress-bar {
            background: linear-gradient(90deg, #4ade80 0%, #f59e0b 50%, #ef4444 100%);
            height: 100%;
            transition: width 0.3s ease;
            width: 0%;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: rgba(80, 120, 200, 0.1);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #64c8ff;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #a0a0b0;
            margin-top: 5px;
        }

        /* Week Cards */
        .weeks-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .week-card {
            background: rgba(30, 30, 50, 0.6);
            border: 1px solid rgba(100, 150, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .week-card:hover {
            transform: translateY(-2px);
            border-color: rgba(100, 200, 255, 0.4);
        }

        .week-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(100, 150, 255, 0.2);
            padding-bottom: 10px;
        }

        .week-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #64c8ff;
        }

        .week-progress {
            font-size: 0.9rem;
            color: #a0a0b0;
        }

        .problem-list {
            list-style: none;
        }

        .problem-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(100, 100, 150, 0.1);
            border-radius: 6px;
            transition: background 0.2s ease;
        }

        .problem-item:hover {
            background: rgba(100, 150, 255, 0.15);
        }

        .problem-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            cursor: pointer;
            accent-color: #4ade80;
        }

        .problem-item input[type="checkbox"]:checked + .problem-info {
            opacity: 0.6;
        }

        .problem-item input[type="checkbox"]:checked + .problem-info .problem-name {
            text-decoration: line-through;
            color: #4ade80;
        }

        .problem-info {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .problem-name {
            color: #e0e0e0;
            font-size: 0.95rem;
        }

        .difficulty-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .difficulty-easy {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        .difficulty-medium {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .difficulty-hard {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* Charts */
        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .chart-box {
            background: rgba(30, 30, 50, 0.6);
            border: 1px solid rgba(100, 150, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #64c8ff;
        }

        canvas {
            max-width: 100%;
            height: auto;
        }

        /* Heatmap */
        .heatmap-container {
            background: rgba(30, 30, 50, 0.6);
            border: 1px solid rgba(100, 150, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            margin-top: 30px;
        }

        .heatmap-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #64c8ff;
        }

        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(52, 1fr);
            gap: 2px;
        }

        .heatmap-cell {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            background: rgba(100, 100, 150, 0.3);
            border: 1px solid rgba(100, 150, 255, 0.1);
        }

        .heatmap-cell.level-1 {
            background: rgba(74, 222, 128, 0.3);
        }

        .heatmap-cell.level-2 {
            background: rgba(74, 222, 128, 0.5);
        }

        .heatmap-cell.level-3 {
            background: rgba(74, 222, 128, 0.7);
        }

        .heatmap-cell.level-4 {
            background: rgba(74, 222, 128, 1);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .weeks-container {
                grid-template-columns: 1fr;
            }

            .charts-container {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #a0a0b0;
        }

        .button {
            background: linear-gradient(135deg, #64c8ff 0%, #4ade80 100%);
            color: #0f0f1e;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: transform 0.2s ease;
        }

        .button:hover {
            transform: scale(1.05);
        }

        .button:active {
            transform: scale(0.98);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(74, 222, 128, 0.2);
            border: 1px solid rgba(74, 222, 128, 0.5);
            color: #4ade80;
            padding: 15px 20px;
            border-radius: 8px;
            animation: slideUp 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🔥 LeetCode Interview Prep</h1>
            <p>8-Week Structured Roadmap for MAANG + Mid-Level Interviews</p>
            
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-number" id="totalSolved">0</div>
                    <div class="stat-label">Problems Solved</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="totalProblems">76</div>
                    <div class="stat-label">Total Problems</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="currentWeek">1</div>
                    <div class="stat-label">Current Week</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="completionRate">0%</div>
                    <div class="stat-label">Completion Rate</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="currentStreak">0</div>
                    <div class="stat-label">Day Streak</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="estimatedDays">-</div>
                    <div class="stat-label">Days Until 100%</div>
                </div>
            </div>
        </div>

        <!-- Weekly Problems -->
        <div class="weeks-container" id="weeksContainer"></div>

        <!-- Charts -->
        <div class="charts-container">
            <div class="chart-box">
                <div class="chart-title">Difficulty Distribution</div>
                <canvas id="difficultyChart"></canvas>
            </div>
            <div class="chart-box">
                <div class="chart-title">Pattern Mastery</div>
                <canvas id="patternChart"></canvas>
            </div>
        </div>

        <!-- Heatmap -->
        <div class="heatmap-container">
            <div class="heatmap-title">Daily Solving Activity (52-Week Heatmap)</div>
            <div class="heatmap-grid" id="heatmapGrid"></div>
        </div>
    </div>

    <script>
        let progressData = {};
        let difficultyChart = null;
        let patternChart = null;

        // Load progress from progress.json
        async function loadProgress() {
            try {
                const response = await fetch('./progress.json');
                progressData = await response.json();
                renderUI();
            } catch (error) {
                console.error('Error loading progress:', error);
                document.body.innerHTML = '<div class="no-data"><p>Error loading progress.json. Make sure it\'s in the same directory.</p></div>';
            }
        }

        // Render the entire UI
        function renderUI() {
            renderWeeks();
            updateStats();
            renderCharts();
            renderHeatmap();
        }

        // Render weeks and problems
        function renderWeeks() {
            const container = document.getElementById('weeksContainer');
            container.innerHTML = '';

            const weeks = {};
            
            // Group problems by week
            for (let id in progressData.problems) {
                const problem = progressData.problems[id];
                const week = problem.week;
                if (!weeks[week]) weeks[week] = [];
                weeks[week].push({ id, ...problem });
            }

            // Sort weeks and render
            for (let weekNum = 1; weekNum <= 8; weekNum++) {
                const problems = weeks[weekNum] || [];
                const solvedCount = problems.filter(p => p.solved).length;
                
                const weekCard = document.createElement('div');
                weekCard.className = 'week-card';

                let weekTitle = '';
                switch(weekNum) {
                    case 1: weekTitle = 'Week 1: Arrays & Hashing + Two Pointers'; break;
                    case 2: weekTitle = 'Week 2: Sliding Window + Binary Search'; break;
                    case 3: weekTitle = 'Week 3: Stack + Linked Lists'; break;
                    case 4: weekTitle = 'Week 4: Trees - BFS/DFS'; break;
                    case 5: weekTitle = 'Week 5: Graphs + Backtracking'; break;
                    case 6: weekTitle = 'Week 6: Dynamic Programming'; break;
                    case 7: weekTitle = 'Week 7: Heap + Intervals + Trie'; break;
                    case 8: weekTitle = 'Week 8: Mixed Review + Mock Interviews'; break;
                }

                let html = `
                    <div class="week-header">
                        <div class="week-title">${weekTitle}</div>
                        <div class="week-progress">${solvedCount}/${problems.length} done</div>
                    </div>
                    <ul class="problem-list">
                `;

                problems.forEach(problem => {
                    const diffClass = `difficulty-${problem.difficulty.toLowerCase()}`;
                    html += `
                        <li class="problem-item">
                            <input type="checkbox" ${problem.solved ? 'checked' : ''} data-problem-id="${problem.id}" onchange="toggleProblem(${problem.id})">
                            <div class="problem-info">
                                <span class="problem-name">${problem.name} <small>#${problem.lc}</small></span>
                                <span class="difficulty-badge ${diffClass}">${problem.difficulty}</span>
                            </div>
                        </li>
                    `;
                });

                html += '</ul>';
                weekCard.innerHTML = html;
                container.appendChild(weekCard);
            }
        }

        // Toggle problem as solved
        function toggleProblem(problemId) {
            const problem = progressData.problems[problemId];
            problem.solved = !problem.solved;
            if (problem.solved) {
                problem.date_solved = new Date().toISOString().split('T')[0];
            } else {
                problem.date_solved = null;
            }
            
            // Save to localStorage
            localStorage.setItem('leetcode_progress', JSON.stringify(progressData));
            
            // Update UI
            updateStats();
            renderCharts();
            renderHeatmap();
            
            // Show toast
            showToast(problem.solved ? '✅ Problem marked as solved!' : '⬜ Problem unmarked');
        }

        // Update stats
        function updateStats() {
            const problems = Object.values(progressData.problems);
            const solved = problems.filter(p => p.solved).length;
            const total = problems.length;
            const percentage = Math.round((solved / total) * 100);

            document.getElementById('totalSolved').textContent = solved;
            document.getElementById('completionRate').textContent = percentage + '%';
            document.getElementById('progressBar').style.width = percentage + '%';

            // Current week
            const today = new Date();
            const daysIntoYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
            const currentWeek = Math.ceil((daysIntoYear + new Date(today.getFullYear(), 0, 1).getDay()) / 7);
            document.getElementById('currentWeek').textContent = Math.min(currentWeek, 8);

            // Streak
            let streak = 0;
            let checkDate = new Date();
            const solvedDates = new Set();
            problems.forEach(p => {
                if (p.date_solved) solvedDates.add(p.date_solved);
            });
            
            while (solvedDates.has(checkDate.toISOString().split('T')[0])) {
                streak++;
                checkDate.setDate(checkDate.getDate() - 1);
            }
            document.getElementById('currentStreak').textContent = streak;

            // Estimated completion
            if (solved === total) {
                document.getElementById('estimatedDays').textContent = '✅ Done!';
            } else if (solved > 0) {
                const daysPerProblem = 8 * 7 / solved; // 8 weeks to solve 'solved' problems
                const remaining = total - solved;
                const estimatedDays = Math.ceil(remaining * daysPerProblem);
                document.getElementById('estimatedDays').textContent = estimatedDays + ' days';
            }
        }

        // Render charts
        function renderCharts() {
            const problems = Object.values(progressData.problems);
            
            // Difficulty distribution
            const difficulties = { Easy: 0, Medium: 0, Hard: 0 };
            const patterns = {};

            problems.forEach(p => {
                difficulties[p.difficulty]++;
                patterns[p.pattern] = (patterns[p.pattern] || 0) + (p.solved ? 1 : 0);
            });

            const diffCtx = document.getElementById('difficultyChart').getContext('2d');
            if (difficultyChart) difficultyChart.destroy();
            
            difficultyChart = new Chart(diffCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Easy', 'Medium', 'Hard'],
                    datasets: [{
                        data: [difficulties.Easy, difficulties.Medium, difficulties.Hard],
                        backgroundColor: ['rgba(74, 222, 128, 0.7)', 'rgba(245, 158, 11, 0.7)', 'rgba(239, 68, 68, 0.7)'],
                        borderColor: ['rgba(74, 222, 128, 1)', 'rgba(245, 158, 11, 1)', 'rgba(239, 68, 68, 1)'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: '#e0e0e0', font: { size: 12 } }
                        }
                    }
                }
            });

            // Pattern completion
            const patternCtx = document.getElementById('patternChart').getContext('2d');
            const patternLabels = Object.keys(patterns);
            const solvedCounts = patternLabels.map(p => patterns[p] || 0);
            const totalCounts = patternLabels.map(p => {
                return problems.filter(prob => prob.pattern === p).length;
            });

            if (patternChart) patternChart.destroy();
            
            patternChart = new Chart(patternCtx, {
                type: 'bar',
                data: {
                    labels: patternLabels,
                    datasets: [{
                        label: 'Solved',
                        data: solvedCounts,
                        backgroundColor: 'rgba(74, 222, 128, 0.7)',
                        borderColor: 'rgba(74, 222, 128, 1)',
                        borderWidth: 1
                    }, {
                        label: 'Total',
                        data: totalCounts,
                        backgroundColor: 'rgba(100, 100, 150, 0.3)',
                        borderColor: 'rgba(100, 150, 255, 0.5)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    indexAxis: 'y',
                    plugins: {
                        legend: {
                            labels: { color: '#e0e0e0', font: { size: 12 } }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#a0a0b0' },
                            grid: { color: 'rgba(100, 100, 150, 0.2)' }
                        },
                        y: {
                            ticks: { color: '#a0a0b0' },
                            grid: { color: 'rgba(100, 100, 150, 0.2)' }
                        }
                    }
                }
            });
        }

        // Render heatmap
        function renderHeatmap() {
            const heatmapGrid = document.getElementById('heatmapGrid');
            heatmapGrid.innerHTML = '';

            // Count solves by date
            const solveCounts = {};
            const problems = Object.values(progressData.problems);
            problems.forEach(p => {
                if (p.date_solved) {
                    solveCounts[p.date_solved] = (solveCounts[p.date_solved] || 0) + 1;
                }
            });

            // Generate 52 weeks of cells
            let currentDate = new Date();
            currentDate.setDate(currentDate.getDate() - (52 * 7)); // 52 weeks back

            for (let i = 0; i < 52 * 7; i++) {
                const dateStr = currentDate.toISOString().split('T')[0];
                const count = solveCounts[dateStr] || 0;
                
                const cell = document.createElement('div');
                cell.className = 'heatmap-cell';
                
                if (count > 0) {
                    if (count >= 3) cell.classList.add('level-4');
                    else if (count >= 2) cell.classList.add('level-3');
                    else if (count >= 1) cell.classList.add('level-2');
                    else cell.classList.add('level-1');
                }
                
                cell.title = `${dateStr}: ${count} problem${count !== 1 ? 's' : ''}`;
                heatmapGrid.appendChild(cell);
                
                currentDate.setDate(currentDate.getDate() + 1);
            }
        }

        // Show toast notification
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 2000);
        }

        // Load from localStorage if available
        window.addEventListener('load', () => {
            const stored = localStorage.getItem('leetcode_progress');
            if (stored) {
                progressData = JSON.parse(stored);
                renderUI();
            } else {
                loadProgress();
            }
        });

        // Save on page exit
        window.addEventListener('beforeunload', () => {
            if (Object.keys(progressData).length > 0) {
                localStorage.setItem('leetcode_progress', JSON.stringify(progressData));
            }
        });
    </script>
</body>
</html>
